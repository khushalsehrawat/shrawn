spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/shrawn}
    username: ${DB_USERNAME:shrawn}
    password: ${DB_PASSWORD:shrawn}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      leak-detection-threshold: 60000

  flyway:
    enabled: true
    url: ${DB_URL:jdbc:postgresql://localhost:5432/shrawn}
    user: ${DB_USERNAME:shrawn}
    password: ${DB_PASSWORD:shrawn}

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        generate_statistics: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s

server:
  port: ${SERVER_PORT:8080}

management:
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.expenseTracker.shrawn: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

shrawn:
  storage:
    provider: local
    local:
      root-directory: ${LOCAL_STORAGE_PATH:./data/uploads}

  frontend:
    allowed-origins:
      - ${FRONTEND_URL:http://localhost:5173}

  security:
    secure-cookies: false